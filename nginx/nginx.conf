# DataStrat Nginx Reverse Proxy Configuration
# 
# This nginx server acts as a reverse proxy for all services in the Docker stack.
# In production, you would configure SSL/TLS certificates here.
#
# Zitadel is accessed directly at http://localhost:8080 (not through nginx)

# Increase timeout for long-running requests
proxy_read_timeout 300;
proxy_connect_timeout 300;
proxy_send_timeout 300;

# Allow large file uploads
client_max_body_size 60M;

# Upstream services (Docker service names)
upstream datastrat_ui {
    server ui:3000;
}

upstream datastrat_api {
    server api:8000;
}

upstream datastrat_zitadel {
    server zitadel:8080;
}

# Auth server - captures 'auth.' subdomains for Zitadel
server {
    listen 80;
    server_name ~^auth\.;

    location / {
        proxy_pass http://datastrat_zitadel;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Zitadel recommended headers
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

# Local Development Auth server (Fallback for localhost:8080)
server {
    listen 8080;
    server_name localhost;

    location / {
        proxy_pass http://datastrat_zitadel;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Main Application server (default fallback)
server {
    listen 80 default_server;
    server_name _;

    # UI - Main application
    location / {
        proxy_pass http://datastrat_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API - Backend REST API
    location /api/ {
        proxy_pass http://datastrat_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # CORS headers (adjust as needed for production)
        add_header 'Access-Control-Allow-Origin' 'http://localhost' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

